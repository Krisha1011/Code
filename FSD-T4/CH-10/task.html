<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <form>
    <input id="i1">
    <input type="password" id="i2">
    <input type="button" onclick="fun(event)" value="submit">
  </form>

  <p id="msg"></p>

<script>
  function fun(e){
    e.preventDefault();
    var u=document.getElementById("i1").value;
    var p=document.getElementById("i2").value;
    var m=document.getElementById("msg");

    var p1=/^[@_0-9]/;
    var p2=/^[A-Za-z0-9@!_-]{6,12}$/;
    msg.style.color="red";

    if(u.length===0 || p.length===0){
      m.innerHTML=" Both fields are mandatory ";
    }
    else if(p1.test(u)){
      m.innerHTML= "Username must not start with @,_,0-9";
    }
    else if(!p2.test(p)){
      m.innerHTML= "password must be 6 to 12 characters";
    }
    else{
      m.innerHTML=`Welcome ${u}`;
      m.style.color="green";
    }
    }
</script>
</body>
</html>
