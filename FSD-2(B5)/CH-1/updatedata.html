<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

        let person={name:"Rahul",age:22,city:"Ahmedabad"};

        //using dot notation:
        person.age=30;
        console.log(person);

        //using bracket notation:
        person["city"]="ABD"
        console.log(person);

        //using variable key:
        let key="name";
        person[key]="XYZ";
        console.log(person);
        
    </script>
</body>
</html>
